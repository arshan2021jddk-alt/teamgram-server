name: Build and Upload

on:
  push:
    branches:
      - 'codex/add-group-voice-call-feature'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/teamgram:latest

      - name: Pull image for inspection
        run: docker pull ghcr.io/${{ github.repository_owner }}/teamgram:latest

      - name: List files in /app
        run: |
          echo "=== Contents of /app ==="
          docker run --rm --entrypoint="" ghcr.io/${{ github.repository_owner }}/teamgram:latest ls -la /app
          echo "=== Searching for executables ==="
          docker run --rm --entrypoint="" ghcr.io/${{ github.repository_owner }}/teamgram:latest find /app -type f -executable

      - name: Extract binary (adjust name if needed)
        run: |
          # به‌طور پیش‌فرض همون مسیر همیشگی رو تست می‌کنیم
          # اگه توی مرحله قبل اسم دیگه‌ای دیدی، اینجا تغییرش بده
          BINARY_PATH="/app/teamgramd"   # ← بعد از دیدن خروجی ls این رو اصلاح کن
          docker create --name tmp-extract ghcr.io/${{ github.repository_owner }}/teamgram:latest
          docker cp tmp-extract:${BINARY_PATH} ./teamgramd 2>/dev/null || echo "File not found, check the listing above"
          docker rm tmp-extract
        continue-on-error: true   # موقتاً خطا رو نادیده بگیر تا بتونی log رو ببینی

      - name: Upload binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: teamgramd
          path: ./teamgramd
        if: success()   # فقط اگه فایل وجود داشت آپلود کنه
