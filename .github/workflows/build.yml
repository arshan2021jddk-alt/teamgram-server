name: Build and Upload

on:
  push:
    branches:
      - 'codex/add-group-voice-call-feature'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/teamgram:latest

      - name: Pull image for extraction
        run: docker pull ghcr.io/${{ github.repository_owner }}/teamgram:latest

      - name: Extract gnetway binary
        run: |
          docker create --name tmp-extract ghcr.io/${{ github.repository_owner }}/teamgram:latest
          docker cp tmp-extract:/app/bin/gnetway ./teamgramd
          docker rm tmp-extract
          ls -lh ./teamgramd

      - name: Upload binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: teamgramd
          path: ./teamgramd
