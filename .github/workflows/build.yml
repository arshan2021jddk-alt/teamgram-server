name: Build Only Gateway and Session for Windows

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Fix gnet dependency for Windows
        shell: pwsh
        run: |
          go mod edit -replace github.com/teamgram/gnet/v2=github.com/panjf2000/gnet/v2@v2.6.0
          go mod tidy

      - name: Build Gateway
        shell: pwsh
        run: |
          $binDir = "bin"
          New-Item -ItemType Directory -Force -Path $binDir
          Push-Location app/interface/gateway/cmd/gateway
          go build -o (Join-Path (Get-Location) "..\..\..\..\..\$binDir\gateway.exe")
          Pop-Location

      - name: Build Session
        shell: pwsh
        run: |
          Push-Location app/interface/session/cmd/session
          go build -o (Join-Path (Get-Location) "..\..\..\..\..\bin\session.exe")
          Pop-Location

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: teamgram-light-windows
          path: bin/
