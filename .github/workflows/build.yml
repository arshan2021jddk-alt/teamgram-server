name: Build Teamgram Binaries for Linux

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build all binaries
        shell: bash
        run: |
          mkdir -p bin
          find . -name main.go | while read f; do
            dir=$(dirname "$f")
            service=$(basename "$dir")
            echo "Building $service..."
            (cd "$dir" && go build -o "../../../../bin/$service")
          done

      - name: Upload all binaries
        uses: actions/upload-artifact@v4
        with:
          name: teamgram-linux-all
          path: bin/
