name: Prepare Vendor Package for Offline Build

on:
  workflow_dispatch:

  push:
    branches:
      - 'codex/add-group-voice-call-feature'

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Download dependencies (vendor)
        run: go mod vendor

      - name: Create package
        run: |
          zip -r teamgram-vendor.zip . \
            -x ".git/*" \
            -x ".github/*" \
            -x "docker/*" \
            -x "*.log"

      - name: Upload vendor package
        uses: actions/upload-artifact@v4
        with:
          name: teamgram-vendor
          path: teamgram-vendor.zip
