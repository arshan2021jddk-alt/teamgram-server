name: Extract gnetway binary

on:
  workflow_dispatch:   # فقط دستی اجرا میشه، بی دردسر
  push:
    branches:
      - 'codex/add-group-voice-call-feature'

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        run: docker pull ghcr.io/${{ github.repository_owner }}/teamgram:latest

      - name: Extract gnetway binary
        run: |
          echo "Creating temporary container..."
          docker create --name tmp-extract ghcr.io/${{ github.repository_owner }}/teamgram:latest
          echo "Copying /app/bin/gnetway ..."
          docker cp tmp-extract:/app/bin/gnetway ./gnetway  # اسم خروجی gnetway
          docker rm tmp-extract
          echo "Done. File size:"
          ls -lh ./gnetway

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: gnetway
          path: ./gnetway
