name: Build Gnetway and Session only

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Fix gnet dependency for Windows
        shell: pwsh
        run: |
          go mod edit -replace github.com/teamgram/gnet/v2=github.com/panjf2000/gnet/v2@v2.6.0
          go mod tidy

      - name: Build Gnetway
        shell: pwsh
        run: |
          mkdir bin
          cd app\interface\gnetway\cmd\gnetway
          go build -o ..\..\..\..\..\bin\gnetway.exe
          cd ..\..\..\..\..

      - name: Build Session
        shell: pwsh
        run: |
          cd app\interface\session\cmd\session
          go build -o ..\..\..\..\..\bin\session.exe
          cd ..\..\..\..\..

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: teamgram-gateway-only
          path: bin/
