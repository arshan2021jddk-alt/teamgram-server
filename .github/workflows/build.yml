name: Extract Only gnetway

on:
  workflow_dispatch:
  push:
    branches:
      - 'codex/add-group-voice-call-feature'

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        run: docker pull ghcr.io/${{ github.repository_owner }}/teamgram:latest

      - name: Inspect and extract
        run: |
          echo "=== Checking /app/bin ==="
          docker run --rm --entrypoint="" ghcr.io/${{ github.repository_owner }}/teamgram:latest ls -lh /app/bin/gnetway || echo "gnetway NOT FOUND"

          echo "=== Extracting gnetway ==="
          docker create --name tmp-extract ghcr.io/${{ github.repository_owner }}/teamgram:latest
          docker cp tmp-extract:/app/bin/gnetway ./gnetway
          docker rm tmp-extract

          if [ -f ./gnetway ]; then
            echo "Extraction successful. File size:"
            ls -lh ./gnetway
          else
            echo "ERROR: gnetway was not extracted!"
            exit 1
          fi

      - name: Upload gnetway
        uses: actions/upload-artifact@v4
        with:
          name: gnetway
          path: ./gnetway
